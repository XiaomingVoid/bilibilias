name: Android Build & Release

on:
  push:
    tags:
      - 'v*' # 当你推送到以 v 开头的标签（如 v1.0.0）时触发发布

# 必须添加 permissions 权限，否则 Action 没有权限创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: zulu
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 构建 APK (Official Release版本)
      - name: Build Official Release APK
        run: ./gradlew :app:assembleOfficialRelease --stacktrace --info
        env:
          GRADLE_OPTS: "-Xmx2048m"

      # === 构建验证：列出生成的 APK 文件 ===
      - name: List APK outputs (Debug)
        if: always()
        run: |
          echo "=== APK 输出目录结构 ==="
          find app/build/outputs/apk -type d || true
          echo ""
          echo "=== 所有生成的 APK 文件 ==="
          find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \; || true

      # === 验证 APK 是否存在 ===
      - name: Verify APK exists
        id: apk-check
        run: |
          # 查找 Official Release 的 APK
          APK_PATH=$(find app/build/outputs/apk/official/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ 错误：未找到 official/release APK 文件"
            echo "可用的构建输出："
            find app/build/outputs/apk -type d | head -20
            exit 1
          fi
          
          APK_COUNT=$(find app/build/outputs/apk/official/release -name "*.apk" -type f | wc -l)
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_count=$APK_COUNT" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          
          echo "✅ 找到 $APK_COUNT 个官方版本 APK 文件"
          find app/build/outputs/apk/official/release -name "*.apk" -type f | while read f; do
            echo "  - $(basename $f) ($(du -h $f | cut -f1))"
          done

      # === 获取提交信息 ===
      - name: Get commit info
        id: commit-info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_EMAIL=$(git log -1 --pretty=%ae)
          COMMIT_DATE=$(git log -1 --pretty=%ai)
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "email=$COMMIT_EMAIL" >> $GITHUB_OUTPUT
          echo "date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      # === 上传 APK 到 GitHub Artifacts（备份） ===
      - name: Upload APK to Artifacts
        if: steps.apk-check.outputs.apk_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: APK-official-${{ github.ref_name }}-${{ steps.commit-info.outputs.short_sha }}
          path: ${{ steps.apk-check.outputs.apk_path }}
          retention-days: 90
          if-no-files-found: error
          compression-level: 0

      # === 自动创建 GitHub Release 并上传文件 ===
      - name: Create GitHub Release
        if: steps.apk-check.outputs.apk_count > 0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 📱 Official Release

            **Tag**: `${{ github.ref_name }}`
            **Build Date**: ${{ steps.commit-info.outputs.date }}
            **Commit**: [${{ steps.commit-info.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Author**: ${{ steps.commit-info.outputs.author }} <${{ steps.commit-info.outputs.email }}>

            ### 📝 Commit Message
            ```
            ${{ steps.commit-info.outputs.message }}
            ```

            ### 📦 APK Information
            - **File**: $(basename ${{ steps.apk-check.outputs.apk_path }})
            - **Size**: ${{ steps.apk-check.outputs.apk_size }}
            - **Count**: ${{ steps.apk-check.outputs.apk_count }}
            - **Flavor**: official
            - **Build Type**: release
            - **Supported ABIs**: armeabi-v7a, arm64-v8a, x86_64, universal

            ### 🔗 Resources
            - [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Automatically built and released via GitHub Actions*
          draft: false
          prerelease: false
          files: ${{ steps.apk-check.outputs.apk_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === 构建失败通知 ===
      - name: Build Failure Summary
        if: failure()
        run: |
          echo "❌ 构建失败"
          echo "Workflow: ${{ github.workflow }}"
          echo "Tag: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "检查项："
          echo "  1. 确认存在 'official' flavor 的构建配置"
          echo "  2. 查看构建日志找出具体错误"
          echo "  3. JDK 版本是否与项目兼容（当前使用 JDK 21）"

      # === 构建成功通知 ===
      - name: Build Success Summary
        if: success()
        run: |
          echo "✅ 构建和发布成功！"
          echo ""
          echo "📦 Release 信息："
          echo "  Tag: ${{ github.ref_name }}"
          echo "  APK: $(basename ${{ steps.apk-check.outputs.apk_path }})"
          echo "  大小: ${{ steps.apk-check.outputs.apk_size }}"
          echo ""
          echo "🔗 访问链接："
          echo "  Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "  Artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
