name: Android Build & Release (Official)

on:
  push:
    tags:
      - 'v*' # 当推送到以 v 开头的标签（如 v1.0.0）时触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: zulu
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 构建 APK (Official Release版本)
      - name: Build Official Release APK
        run: ./gradlew :app:assembleOfficialRelease --stacktrace --info
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=1g -Dorg.gradle.jvmargs=-Xmx3072m"

      # === 验证并统计 APK 产物 ===
      - name: Verify and Collect APKs
        id: apk-check
        run: |
          APK_DIR="app/build/outputs/apk/official/release"
          if [ ! -d "$APK_DIR" ] || [ -z "$(ls -A $APK_DIR/*.apk 2>/dev/null)" ]; then
            echo "❌ 错误：未找到 official/release APK 文件"
            exit 1
          fi
          
          APK_COUNT=$(find "$APK_DIR" -name "*.apk" -type f | wc -l)
          echo "apk_count=$APK_COUNT" >> $GITHUB_OUTPUT
          echo "✅ 找到 $APK_COUNT 个官方版本 APK 文件："
          ls -lh "$APK_DIR"/*.apk
          
          # 提取简要输出供 Release Notes 使用
          echo "apk_list<<EOF" >> $GITHUB_OUTPUT
          find "$APK_DIR" -name "*.apk" -type f -exec basename {} \; | sed 's/^/- /' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # === 获取提交与标签信息 ===
      - name: Get Ref and Commit Info
        id: info
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # === 上传 APK 到 GitHub Artifacts（备份归档 90天） ===
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bilibilias-Official-${{ github.ref_name }}-${{ steps.info.outputs.short_sha }}
          path: app/build/outputs/apk/official/release/*.apk
          retention-days: 90
          compression-level: 0

      # === 自动创建 GitHub Release 并上传【所有】架构文件 ===
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## 📱 Official Release - ${{ github.ref_name }}

            **Build Date**: ${{ steps.info.outputs.date }}
            **Commit**: [${{ steps.info.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Author**: ${{ steps.info.outputs.author }}

            ### 📝 Commit Message
            ```
            ${{ steps.info.outputs.message }}
            ```

            ### 📦 Included APKs
            ${{ steps.apk-check.outputs.apk_list }}

            ### 🔗 Resources
            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Automatically built and released via GitHub Actions*
          draft: false
          prerelease: false
          files: app/build/outputs/apk/official/release/*.apk  # 此处修复：上传通配符下的所有架构 APK
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
