name: Build Compose APK (Alpha/CI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean Project
        run: ./gradlew clean

      # 情景 A：如果是 Pull Request，执行轻量的 Debug 编译验证以提高速度
      - name: Build APK for PR (Alpha Debug Verification)
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleAlphaDebug --stacktrace

      # 情景 B：如果是 Main 分支 Push 或手动触发，则编译完整的 Alpha Release 版本
      - name: Assemble Alpha Release
        if: github.event_name != 'pull_request'
        run: ./gradlew :app:assembleAlphaRelease --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=1g -Dorg.gradle.jvmargs=-Xmx3072m"

      # === 验证非 PR 情况下的编译产物 ===
      - name: Verify Alpha Release APKs
        if: github.event_name != 'pull_request'
        id: verify-alpha
        run: |
          APK_DIR="app/build/outputs/apk/alpha/release"
          TOTAL_APKS=$(find "$APK_DIR" -name "*.apk" -type f | wc -l)
          echo "total_count=$TOTAL_APKS" >> $GITHUB_OUTPUT
          
          if [ $TOTAL_APKS -eq 0 ]; then
            echo "❌ 错误：未找到任何 Alpha Release APK 文件"
            exit 1
          fi
          echo "✅ 成功找到 $TOTAL_APKS 个 Alpha APK 产物"

      # === 获取用于测试版发布的元数据 ===
      - name: Get Release Metadata
        if: github.event_name != 'pull_request'
        id: meta
        run: |
          echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # === 统一上传测试包到 GitHub Artifacts (保存 30 天) ===
      - name: Upload Alpha APK to Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: APK-Alpha-Artifacts-${{ steps.meta.outputs.short_sha }}
          path: app/build/outputs/apk/alpha/release/*.apk
          retention-days: 30
          compression-level: 0

      # === 自动发布到 GitHub Release（仅限主分支 push 和手动触发，标记为 prerelease） ===
      - name: Create Alpha Release and Upload
        if: github.event_name != 'pull_request' && steps.verify-alpha.outputs.total_count > 0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}
          name: "Alpha Build - ${{ steps.meta.outputs.date }}"
          body: |
            ## 📱 Alpha Build Pre-release

            **🚀 本版本由 GitHub Actions 自动构建，可能存在不稳定性。**

            **Build Time**: ${{ steps.meta.outputs.date }}
            **Commit**: [${{ steps.meta.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Author**: ${{ steps.meta.outputs.author }}

            ### 📝 Commit Message
            ```
            ${{ steps.meta.outputs.message }}
            ```

            ---
            *This is an automated Alpha build. Use at your own risk.*
          draft: false
          prerelease: true  # 核心：标记为预发布版本，不会覆盖正式版的 Latest 标签
          files: app/build/outputs/apk/alpha/release/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
